name: 급식 자동 크롤링

on:
  schedule:
    # 매일 정오 12:00(KST) = UTC 03:00
    - cron: '0 3 * * *'
  # 수동 트리거도 가능
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm ci

      - name: 급식 크롤링
        run: npm run scrape:lunch

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/lunch.json; then
            echo "변경사항 없음"
          else
            git add data/lunch.json
            git commit -m "chore: update lunch data $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
